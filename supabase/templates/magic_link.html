<!doctype html>
<html dir="rtl" lang="he">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /></head>
  <body style="margin:0;background:#f4f6f5;font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;direction:rtl;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f5;padding:24px 0;">
      <tr><td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:16px;overflow:hidden;">
          <tr><td style="background:#0f5238;padding:24px 32px;text-align:center;">
            <span style="color:#ffffff;font-size:22px;font-weight:bold;">רגע אחרון</span>
          </td></tr>
          <tr><td style="padding:32px;">
            <h1 style="margin:0 0 12px;font-size:20px;color:#0f5238;">קישור התחברות</h1>
            <p style="margin:0 0 20px;font-size:15px;line-height:1.6;">לחיצה על הכפתור תחבר אותך לחשבון <strong>רגע אחרון</strong> שלך — בלי צורך בסיסמה:</p>
            <p style="text-align:center;margin:28px 0;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#0f5238;color:#ffffff;text-decoration:none;padding:14px 28px;border-radius:12px;font-size:16px;font-weight:bold;">התחברות</a>
            </p>
            <p style="margin:0 0 8px;font-size:13px;color:#6b6b6b;line-height:1.6;">אם הכפתור לא עובד, אפשר להעתיק את הקישור הזה לדפדפן:</p>
            <p style="margin:0;font-size:12px;color:#0f5238;word-break:break-all;">{{ .ConfirmationURL }}</p>
          </td></tr>
          <tr><td style="padding:20px 32px;border-top:1px solid #eee;text-align:center;">
            <p style="margin:0;font-size:12px;color:#9a9a9a;">לא ביקשת קישור התחברות? אפשר להתעלם מהמייל הזה.</p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
