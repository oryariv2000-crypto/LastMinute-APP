<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Last Minute">
  <defs>
    <linearGradient id="lm-ring" x1="20" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B4332"/>
      <stop offset="1" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="lm-leaf" x1="42" y1="38" x2="54" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74C69D"/>
      <stop offset="1" stop-color="#52B788"/>
    </linearGradient>
  </defs>

  <!-- Clock ring, open on the left -->
  <path d="M18.8 24 A19 19 0 1 1 18.8 40" stroke="url(#lm-ring)" stroke-width="4.2" stroke-linecap="round"/>

  <!-- Motion lines -->
  <g stroke="#52B788" stroke-width="3" stroke-linecap="round">
    <line x1="6"  y1="24" x2="16" y2="24"/>
    <line x1="2"  y1="32" x2="13" y2="32"/>
    <line x1="6"  y1="40" x2="16" y2="40"/>
  </g>

  <!-- Tick marks (12 & 6) -->
  <g stroke="#2D6A4F" stroke-width="2.4" stroke-linecap="round">
    <line x1="36" y1="15" x2="36" y2="18.5"/>
    <line x1="36" y1="45.5" x2="36" y2="49"/>
  </g>

  <!-- Clock hands -->
  <g stroke="#1B4332" stroke-width="3" stroke-linecap="round">
    <line x1="36" y1="32" x2="30" y2="21"/>
    <line x1="36" y1="32" x2="45" y2="25"/>
  </g>
  <circle cx="36" cy="32" r="2.6" fill="#F8F9FA" stroke="#1B4332" stroke-width="2"/>

  <!-- Leaf -->
  <path d="M41.5 49.5 C41.5 41.5 49 38 54 37.5 C54 45 49.5 49.5 41.5 49.5 Z" fill="url(#lm-leaf)"/>
  <path d="M44 47.5 C46 44 49.5 41 53 39" stroke="#F8F9FA" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
</svg>
